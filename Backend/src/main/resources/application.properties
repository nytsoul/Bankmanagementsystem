spring.application.name=Bank-Management-Backend

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bank_management}
# Alternative configuration (if not using URI):
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=bank_management
# spring.data.mongodb.username=your_username
# spring.data.mongodb.password=your_password
# spring.data.mongodb.authentication-database=admin

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-environment-to-something-long-and-random}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# CORS Configuration (handled in code)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# MongoDB specific settings
spring.data.mongodb.auto-index-creation=true

