spring.application.name=Bank-Management-Backend

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bank_management}
app.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bank_management}

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/


# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-environment-to-something-long-and-random}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.example.backend=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# CORS Configuration (handled in code)
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null

# MongoDB specific settings
spring.data.mongodb.auto-index-creation=false

# Development seed user (created only when user collection is empty)
seed.admin.email=${SEED_ADMIN_EMAIL:admin@securebank.com}
seed.admin.password=${SEED_ADMIN_PASSWORD:Admin@123}
seed.admin.first-name=${SEED_ADMIN_FIRST_NAME:System}
seed.admin.last-name=${SEED_ADMIN_LAST_NAME:Admin}

# Admin self-registration key (leave blank to disable admin sign-up)
admin.registration.key=${ADMIN_REGISTRATION_KEY:}

